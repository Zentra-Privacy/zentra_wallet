# Build installable apps for Linux, Windows, Android, and macOS.
# Download from the Actions run → Artifacts, or from Releases on version tags.
name: Build apps (all platforms)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main
      - master

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: sudo ./scripts/ci-install-linux-deps.sh flutter

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify native wallet library
        run: test -f packages/zentra_wallet_core/linux/libzentra_wallet_ffi.so

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "${{ github.workspace }}/zentra-wallet-linux-x64.tar.gz" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: zentra-wallet-linux-x64
          path: zentra-wallet-linux-x64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "zentra-wallet-windows-x64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: zentra-wallet-windows-x64
          path: zentra-wallet-windows-x64.zip
          if-no-files-found: error

  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: zentra-wallet-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          APP="build/macos/Build/Products/Release/zentra_wallet.app"
          test -d "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" zentra-wallet-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: zentra-wallet-macos
          path: zentra-wallet-macos.zip
          if-no-files-found: error

  github-release:
    name: Attach to GitHub Release
    needs: [build-linux, build-windows, build-android, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p staged
          test -f release-files/zentra-wallet-linux-x64/zentra-wallet-linux-x64.tar.gz
          test -f release-files/zentra-wallet-windows-x64/zentra-wallet-windows-x64.zip
          test -f release-files/zentra-wallet-android-apk/app-release.apk
          test -f release-files/zentra-wallet-macos/zentra-wallet-macos.zip
          cp release-files/zentra-wallet-linux-x64/zentra-wallet-linux-x64.tar.gz staged/
          cp release-files/zentra-wallet-windows-x64/zentra-wallet-windows-x64.zip staged/
          cp release-files/zentra-wallet-android-apk/app-release.apk staged/zentra-wallet-android.apk
          cp release-files/zentra-wallet-macos/zentra-wallet-macos.zip staged/
          ls -la staged/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: staged/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
