# Release pipeline (Linux + Windows + Android):
#   1) Build native wallet engine from Zentra v0.1.0 on Ubuntu → native-engine-bundle
#   2) Build Flutter apps → draft or tag release
#
# iOS / macOS: build locally on a Mac (see docs/build-ios.md, docs/build-macos.md).
# Zentra core: https://github.com/Zentra-Privacy/zentra.git @ v0.1.0
name: Release pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ZENTRA_REPO: https://github.com/Zentra-Privacy/zentra.git
  ZENTRA_REF: v0.1.0

jobs:
  # ─── Phase 1: Native engine (Linux + Android + Windows on one Ubuntu runner) ─
  engine-ubuntu:
    name: "Phase 1 · Engine (Linux + Android + Windows)"
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5

      - name: Install native build dependencies
        run: sudo ./scripts/ci-install-linux-deps.sh all

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - run: yes | sdkmanager --licenses || true

      - name: Cache Zentra tree (depends + builds)
        uses: actions/cache@v5
        with:
          path: |
            third_party/zentra/contrib/depends
            third_party/zentra/build
          # PATCHSET_VERSION + patch files must bump when depends recipes change.
          key: zentra-${{ env.ZENTRA_REF }}-p${{ hashFiles('scripts/patches/zentra-depends/**', 'scripts/ci-patch-zentra-depends.sh', 'scripts/ci-configure-mingw-posix.sh', 'scripts/ci-install-linux-deps.sh', 'native/zentra_wallet_ffi/**', 'scripts/lib/native_build*.sh', 'scripts/ci-build-native-engine-ubuntu.sh') }}

      - name: Build engine (Ubuntu)
        run: |
          chmod +x scripts/*.sh scripts/lib/*.sh
          ./scripts/ci-build-native-engine-ubuntu.sh build/engine-ubuntu

      - name: Verify engine bundle (pre-upload)
        run: ./scripts/ci-verify-native-engine.sh build/engine-ubuntu

      - name: Upload engine bundle
        uses: actions/upload-artifact@v6
        with:
          name: engine-ubuntu
          path: build/engine-ubuntu/
          if-no-files-found: error

  package-engine:
    name: "Phase 1 · Package native-engine-bundle"
    needs: [engine-ubuntu]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          name: engine-ubuntu
          path: engine-ubuntu

      - name: Package engine bundle
        run: |
          chmod +x scripts/ci-package-native-engine.sh scripts/ci-verify-native-engine.sh
          ./scripts/ci-package-native-engine.sh engine-ubuntu "" build/native-engine-bundle

      - name: Upload native-engine-bundle
        uses: actions/upload-artifact@v6
        with:
          name: native-engine-bundle
          path: build/native-engine-bundle/
          if-no-files-found: error
          retention-days: 90

  # ─── Phase 2: Flutter apps ───────────────────────────────────────────────────
  build-linux:
    name: "Phase 2 · Linux app"
    needs: [package-engine]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          name: native-engine-bundle
          path: native-engine-bundle
      - run: chmod +x scripts/ci-apply-native-libs.sh && ./scripts/ci-apply-native-libs.sh native-engine-bundle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: sudo ./scripts/ci-install-linux-deps.sh flutter
      - run: flutter config --enable-linux-desktop && flutter pub get
      - run: flutter build linux --release
      - name: Package Linux
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "${{ github.workspace }}/zentra-wallet-linux-x64.tar.gz" .
      - uses: actions/upload-artifact@v6
        with:
          name: zentra-wallet-linux-x64
          path: zentra-wallet-linux-x64.tar.gz
          if-no-files-found: error

  build-windows:
    name: "Phase 2 · Windows app"
    needs: [package-engine]
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          name: native-engine-bundle
          path: native-engine-bundle
      - run: bash ./scripts/ci-apply-native-libs.sh native-engine-bundle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop && flutter pub get
      - run: flutter build windows --release
      - run: bash ./scripts/ci-verify-windows-release.sh build/windows/x64/runner/Release
      - name: Package Windows
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "zentra-wallet-windows-x64.zip" -Force
      - uses: actions/upload-artifact@v6
        with:
          name: zentra-wallet-windows-x64
          path: zentra-wallet-windows-x64.zip
          if-no-files-found: error

  build-android:
    name: "Phase 2 · Android APK"
    needs: [package-engine]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          name: native-engine-bundle
          path: native-engine-bundle
      - run: chmod +x scripts/ci-apply-native-libs.sh && ./scripts/ci-apply-native-libs.sh native-engine-bundle
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: android-actions/setup-android@v3
      - run: yes | flutter doctor --android-licenses || true
      - run: flutter pub get
      - run: flutter build apk --release
      - run: chmod +x scripts/ci-verify-android-apk.sh && ./scripts/ci-verify-android-apk.sh build/app/outputs/flutter-apk/app-release.apk
      - uses: actions/upload-artifact@v6
        with:
          name: zentra-wallet-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  # ─── Phase 3: GitHub Release (Linux + Windows + Android only) ───────────────
  draft-release:
    name: "Phase 3 · Draft release"
    needs: [build-linux, build-windows, build-android]
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !startsWith(github.ref, 'refs/tags/') &&
      needs.build-linux.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          path: release-files
      - run: chmod +x scripts/ci-stage-release-assets.sh && ./scripts/ci-stage-release-assets.sh release-files
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: draft-${{ github.run_number }}
          name: Draft build #${{ github.run_number }}
          draft: true
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            **Zentra Wallet** — engine from [Zentra v0.1.0](https://github.com/Zentra-Privacy/zentra/releases/tag/v0.1.0).

            | Asset | Full wallet |
            |-------|-------------|
            | Linux x64 | ✓ |
            | Windows x64 | ✓ |
            | Android APK | ✓ (arm64 + armeabi-v7a) |

            **macOS / iOS:** build on a Mac — [build-macos.md](https://github.com/${{ github.repository }}/blob/main/docs/build-macos.md), [build-ios.md](https://github.com/${{ github.repository }}/blob/main/docs/build-ios.md)

            [Install guide](https://github.com/${{ github.repository }}/blob/main/docs/download-builds.md)

            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: staged/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: "Phase 3 · Published release"
    needs: [build-linux, build-windows, build-android]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build-linux.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          path: release-files
      - run: chmod +x scripts/ci-stage-release-assets.sh && ./scripts/ci-stage-release-assets.sh release-files
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            Production build — native engine from [Zentra v0.1.0](https://github.com/Zentra-Privacy/zentra/releases/tag/v0.1.0).

            Platforms: **Linux**, **Windows**, **Android**. macOS/iOS: see [docs/building.md](https://github.com/${{ github.repository }}/blob/main/docs/building.md).

            [Install guide](https://github.com/${{ github.repository }}/blob/main/docs/download-builds.md).
          files: staged/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
