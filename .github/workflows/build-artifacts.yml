# Build installable apps for Linux, Windows, Android, and macOS.
# - push main: builds + draft release (uses committed libzentra_wallet_ffi.so)
# - tag v*: rebuilds native .so, then builds + published GitHub Release
# - workflow_dispatch: builds only (no draft)
name: Build apps (all platforms)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

env:
  ZENTRA_REPO: https://github.com/Zentra-Privacy/zentra.git
  ZENTRA_REF: zentra-main

jobs:
  # Version tags: fresh libzentra_wallet_ffi.so before Linux app bundle (slow).
  rebuild-linux-native:
    name: Rebuild native .so (release tag)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Install native build dependencies
        run: sudo ./scripts/ci-install-linux-deps.sh native

      - name: Clone Zentra (with submodules)
        run: |
          git clone -b "$ZENTRA_REF" --recurse-submodules "$ZENTRA_REPO" third_party/zentra
          test -f third_party/zentra/src/wallet/api/wallet2_api.h

      - name: Cache Zentra CMake build
        uses: actions/cache@v5
        with:
          path: third_party/zentra/build/release
          key: zentra-build-${{ runner.os }}-${{ env.ZENTRA_REF }}-${{ hashFiles('native/zentra_wallet_ffi/**', 'scripts/lib/native_build.sh') }}
          restore-keys: |
            zentra-build-${{ runner.os }}-${{ env.ZENTRA_REF }}-
            zentra-build-${{ runner.os }}-

      - name: Build native FFI library
        env:
          ZENTRA_ROOT: ${{ github.workspace }}/third_party/zentra
          JOBS: "2"
        run: |
          chmod +x wallet.sh
          ./wallet.sh build

      - name: Upload native library
        uses: actions/upload-artifact@v5
        with:
          name: libzentra_wallet_ffi-linux
          path: packages/zentra_wallet_core/linux/libzentra_wallet_ffi.so
          if-no-files-found: error

  build-linux:
    name: Linux (x64)
    needs: [rebuild-linux-native]
    if: ${{ !cancelled() && (needs.rebuild-linux-native.result == 'skipped' || needs.rebuild-linux-native.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: sudo ./scripts/ci-install-linux-deps.sh flutter

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Install freshly built native library (release tag)
        if: needs.rebuild-linux-native.result == 'success'
        uses: actions/download-artifact@v5
        with:
          name: libzentra_wallet_ffi-linux
          path: packages/zentra_wallet_core/linux

      - name: Verify native wallet library
        run: test -f packages/zentra_wallet_core/linux/libzentra_wallet_ffi.so

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "${{ github.workspace }}/zentra-wallet-linux-x64.tar.gz" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: zentra-wallet-linux-x64
          path: zentra-wallet-linux-x64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "zentra-wallet-windows-x64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: zentra-wallet-windows-x64
          path: zentra-wallet-windows-x64.zip
          if-no-files-found: error

  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v5
        with:
          name: zentra-wallet-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          APP="build/macos/Build/Products/Release/zentra_wallet.app"
          test -d "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" zentra-wallet-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v5
        with:
          name: zentra-wallet-macos
          path: zentra-wallet-macos.zip
          if-no-files-found: error

  draft-release:
    name: Draft release (review before publish)
    needs: [build-linux, build-windows, build-android, build-macos]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-files

      - name: Stage release assets
        run: chmod +x scripts/ci-stage-release-assets.sh && ./scripts/ci-stage-release-assets.sh release-files

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: draft-${{ github.run_number }}
          name: Draft build #${{ github.run_number }}
          draft: true
          prerelease: true
          make_latest: false
          generate_release_notes: true
          body: |
            **Automated draft** — CI finished on `${{ github.ref_name }}` @ `${{ github.sha }}`.

            1. Download and test the assets below.
            2. When ready: **Edit release** → **Publish release** (makes it public).
            3. For a stable version name, publish a proper tag: `git tag v1.0.0 && git push origin v1.0.0`

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: staged/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Publish release (version tag)
    needs: [build-linux, build-windows, build-android, build-macos, rebuild-linux-native]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build-linux.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-android.result == 'success' &&
      needs.build-macos.result == 'success' &&
      (needs.rebuild-linux-native.result == 'success' || needs.rebuild-linux-native.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-files

      - name: Stage release assets
        run: chmod +x scripts/ci-stage-release-assets.sh && ./scripts/ci-stage-release-assets.sh release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: staged/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
