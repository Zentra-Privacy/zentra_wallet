# Rebuild libzentra_wallet_ffi.so from Zentra source (slow; ~30–90+ min).
# For version tags (v*), native rebuild runs inside "Build apps" workflow instead.
# Use this workflow for manual rebuilds and weekly cache refresh.
name: Build native (Linux)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      zentra_ref:
        description: Zentra git ref (branch, tag, or SHA)
        required: false
        default: zentra-main
  schedule:
    - cron: "0 4 * * 0"

env:
  ZENTRA_REPO: https://github.com/Zentra-Privacy/zentra.git
  # workflow_dispatch input; empty on tag/schedule → default branch
  ZENTRA_REF: ${{ github.event.inputs.zentra_ref || 'zentra-main' }}

jobs:
  build-native:
    name: Build libzentra_wallet_ffi.so
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Install native build dependencies
        run: sudo ./scripts/ci-install-linux-deps.sh native

      - name: Clone Zentra (with submodules)
        run: |
          git clone -b "$ZENTRA_REF" --recurse-submodules "$ZENTRA_REPO" third_party/zentra
          test -f third_party/zentra/src/wallet/api/wallet2_api.h

      - name: Cache Zentra CMake build
        uses: actions/cache@v5
        with:
          path: third_party/zentra/build/release
          key: zentra-build-${{ runner.os }}-${{ env.ZENTRA_REF }}-${{ hashFiles('native/zentra_wallet_ffi/**', 'scripts/lib/native_build.sh') }}
          restore-keys: |
            zentra-build-${{ runner.os }}-${{ env.ZENTRA_REF }}-
            zentra-build-${{ runner.os }}-

      - name: Build native FFI library
        env:
          ZENTRA_ROOT: ${{ github.workspace }}/third_party/zentra
          JOBS: "2"
        run: |
          chmod +x wallet.sh
          ./wallet.sh build

      - name: Verify output
        run: |
          test -f packages/zentra_wallet_core/linux/libzentra_wallet_ffi.so
          file packages/zentra_wallet_core/linux/libzentra_wallet_ffi.so

      - name: Upload native library
        uses: actions/upload-artifact@v5
        with:
          name: libzentra_wallet_ffi-linux
          path: packages/zentra_wallet_core/linux/libzentra_wallet_ffi.so
          if-no-files-found: error
