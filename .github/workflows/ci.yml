# Fast checks on every push and PR: Dart analyze, tests, Linux app build.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop build deps
        run: sudo ./scripts/ci-install-linux-deps.sh flutter

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-linux:
    name: Build Linux app
    runs-on: ubuntu-latest
    needs: analyze-and-test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop build deps
        run: sudo ./scripts/ci-install-linux-deps.sh flutter

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify native wallet library
        run: |
          test -f packages/zentra_wallet_core/linux/libzentra_wallet_ffi.so || {
            echo "::error::libzentra_wallet_ffi.so missing. Run ./wallet.sh build locally or trigger the native-build workflow."
            exit 1
          }

      - name: Build Linux bundle (debug)
        run: flutter build linux --debug

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: zentra-wallet-linux-debug
          path: build/linux/x64/debug/bundle/
          if-no-files-found: error
