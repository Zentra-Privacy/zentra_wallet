name: zentra_wallet_core
description: C++ FFI core for Zentra wallet (amounts, address validation, network params).
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  ffi: ^2.1.4
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      ios:
        ffiPlugin: true
