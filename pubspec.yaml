name: zentra_wallet
description: Zentra (Monero fork) mobile/desktop wallet — Flutter UI + C++ core + wallet RPC.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  zentra_wallet_core:
    path: packages/zentra_wallet_core
  provider: ^6.1.5
  http: ^1.4.0
  shared_preferences: ^2.5.3
  qr_flutter: ^4.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
