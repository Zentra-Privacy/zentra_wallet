name: zentra_wallet
description: Zentra self-custody wallet — Flutter UI + embedded wallet2 (Cake/Monero-style).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  zentra_wallet_core:
    path: packages/zentra_wallet_core
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  qr_flutter: ^4.1.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  wakelock_plus: ^1.3.2
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
